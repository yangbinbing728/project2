<h1>Inverted Highlight</h1>

<p>
Instead of highlighting with brightness,
<span class="invert">attention</span>,
<span class="invert">emphasis</span>,
and <span class="invert">importance</span>
are marked by contrast.
</p>

<p>
Highlight becomes subtraction rather than addition.
</p>
