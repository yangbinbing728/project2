<h1>Bar Highlight</h1>

<p>
This version places emphasis only at the lower half of the word.
<span class="bar">attention</span>,
<span class="bar">emphasis</span>,
and <span class="bar">importance</span>
feel partially marked rather than fully covered.
</p>

<p>
It suggests a more restrained and directional kind of emphasis.
</p>
