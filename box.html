<h1>Box Highlight</h1>

<p>
Instead of filling the word, this version surrounds it.
<span class="box">attention</span>,
<span class="box">emphasis</span>,
and <span class="box">importance</span>
are framed rather than covered.
</p>

<p>
The box turns highlighting into containment instead of illumination.
</p>
