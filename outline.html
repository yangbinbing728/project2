<h1>Outline Highlight</h1>

<p>
This version uses a softer method of emphasis.
<span class="outline">Attention</span>,
<span class="outline">emphasis</span>,
and <span class="outline">importance</span>
are marked without fully covering the text.
</p>

<p>
Highlight becomes more like a trace than a block.
