<h1>Uneven Highlight</h1>

<p>
Highlight does not always appear clean or mechanical.
<span class="uneven">attention</span>,
<span class="uneven">emphasis</span>,
and <span class="uneven">importance</span>
look slightly irregular, as if marked by hand.
</p>

<p>
This version makes the interface feel more personal and less precise.
</p>
