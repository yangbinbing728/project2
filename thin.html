<h1>Thin Highlight</h1>

<p>
A thinner highlight gives less weight to the word.
<span class="thin">attention</span>,
<span class="thin">emphasis</span>,
and <span class="thin">importance</span>
remain visible, but the marker feels more restrained.
</p>
