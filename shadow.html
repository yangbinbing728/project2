<title>shadow.doc</title>
<link rel="stylesheet" href="doc.css">

<style>
.shadow{
  position: relative;
  display:inline-block;
  z-index:1;
}

.shadow::after{
  content:"";
  position:absolute;
  left:2px;
  bottom:2px;
  width:100%;
  height:60%;
  background:#e7de57;
  opacity:0.6;
  z-index:-1;
}
</style>
</head>

<body>

<header class="toolbar">
<div class="doc-name">shadow.doc</div>
<div class="tools">
<span class="tool-label">shadow highlight</span>
</div>
</header>

<main class="page">
<article class="document">

<h1>Shadow Highlight</h1>

<p>
In this version, emphasis does not sit directly on the word.
<span class="shadow">attention</span>,
<span class="shadow">emphasis</span>,
and <span class="shadow">importance</span>
appear as a layer beneath the text.
</p>

<p>
Highlight becomes something indirect, more like a trace than a clear signal.
</p>
